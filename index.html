<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>لعبة تربّع - مسابقة معلومات</title>
  <style>
    :root {
      --bg-1: #020617;
      --bg-2: #0f172a;
      --panel: rgba(15, 23, 42, 0.74);
      --panel-strong: #111c34;
      --card: #1e293b;
      --accent: #fbbf24;
      --accent-2: #22d3ee;
      --team-1: #38bdf8;
      --team-2: #f472b6;
      --good: #22c55e;
      --bad: #ef4444;
      --text: #f8fafc;
      --muted: #94a3b8;
      --shadow: 0 16px 36px rgba(0, 0, 0, 0.35);
      --tile-shadow: 0 8px 16px rgba(37, 99, 235, 0.35);
      --tile-glow: 0 0 0 rgba(59, 130, 246, 0.5);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: "Tajawal", "Cairo", "Segoe UI", sans-serif;
    }

    body {
      direction: rtl;
      min-height: 100vh;
      color: var(--text);
      background:
        radial-gradient(circle at 15% 15%, rgba(56, 189, 248, 0.18) 0%, transparent 35%),
        radial-gradient(circle at 80% 8%, rgba(244, 114, 182, 0.15) 0%, transparent 30%),
        linear-gradient(165deg, var(--bg-2) 0%, var(--bg-1) 75%);
      padding: 24px;
    }

    .container {
      max-width: 1260px;
      margin: 0 auto;
      display: grid;
      gap: 20px;
    }

    .top {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      justify-content: space-between;
      align-items: center;
      background: var(--panel);
      border: 1px solid rgba(148, 163, 184, 0.24);
      border-radius: 20px;
      padding: 18px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(7px);
    }

    .header-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    h1 {
      font-size: clamp(1.35rem, 2.3vw, 1.9rem);
      letter-spacing: 0.4px;
      color: var(--accent);
      text-shadow: 0 2px 12px rgba(251, 191, 36, 0.28);
    }

    .scoreboard {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .team-card {
      position: relative;
      background: linear-gradient(160deg, #1e293b 8%, #0b1226 100%);
      border: 1px solid rgba(148, 163, 184, 0.2);
      border-radius: 14px;
      padding: 10px 14px;
      min-width: 190px;
      display: grid;
      gap: 8px;
      transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
    }

    .team-card.active {
      transform: translateY(-3px) scale(1.02);
      border-color: rgba(248, 250, 252, 0.55);
      box-shadow: 0 0 0 1px rgba(248, 250, 252, 0.35), 0 12px 28px rgba(14, 165, 233, 0.3);
    }

    .team-card.team-1.active {
      border-color: rgba(56, 189, 248, 0.95);
      box-shadow: 0 0 0 1px rgba(56, 189, 248, 0.45), 0 12px 28px rgba(56, 189, 248, 0.35);
    }

    .team-card.team-2.active {
      border-color: rgba(244, 114, 182, 0.95);
      box-shadow: 0 0 0 1px rgba(244, 114, 182, 0.42), 0 12px 28px rgba(244, 114, 182, 0.3);
    }

    .team-name {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-weight: 700;
      color: var(--accent-2);
      gap: 8px;
    }

    .team-score {
      font-size: 1.55rem;
      font-weight: 900;
      letter-spacing: 0.5px;
    }

    .score-pop {
      position: absolute;
      left: 12px;
      bottom: 12px;
      font-weight: 900;
      opacity: 0;
      transform: translateY(0) scale(0.8);
      pointer-events: none;
      text-shadow: 0 4px 14px rgba(0, 0, 0, 0.45);
    }

    .score-pop.show {
      animation: scorePop 0.9s ease forwards;
    }

    .score-pop.positive {
      color: #86efac;
    }

    .score-pop.negative {
      color: #fca5a5;
    }

    @keyframes scorePop {
      0% { opacity: 0; transform: translateY(8px) scale(0.7); }
      25% { opacity: 1; transform: translateY(-2px) scale(1); }
      100% { opacity: 0; transform: translateY(-24px) scale(0.95); }
    }

    .controls {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
    }

    button {
      border: none;
      border-radius: 10px;
      padding: 7px 12px;
      font-size: 0.92rem;
      cursor: pointer;
      color: #f8fafc;
      transition: transform 0.22s cubic-bezier(.2,.9,.2,1), opacity 0.2s ease, box-shadow 0.22s ease, filter 0.2s ease;
    }

    button:hover {
      transform: translateY(-1px);
      filter: brightness(1.04);
    }

    button:active {
      transform: translateY(1px) scale(0.98);
    }

    .subtract {
      background: linear-gradient(140deg, #ef4444, #b91c1c);
      box-shadow: 0 6px 14px rgba(239, 68, 68, 0.3);
    }

    .award {
      background: linear-gradient(140deg, #16a34a, #15803d);
      font-weight: 700;
      box-shadow: 0 8px 16px rgba(34, 197, 94, 0.32);
    }

    .reset {
      background: linear-gradient(140deg, #334155, #1e293b);
      border: 1px solid rgba(148, 163, 184, 0.32);
      padding: 10px 15px;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(5, minmax(140px, 1fr));
      gap: 12px;
    }

    .column {
      background: rgba(17, 28, 52, 0.64);
      border: 1px solid rgba(148, 163, 184, 0.22);
      border-radius: 14px;
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    .category {
      background: linear-gradient(135deg, #0284c7 0%, #2563eb 100%);
      text-align: center;
      font-size: 1rem;
      font-weight: 800;
      padding: 14px 8px;
      min-height: 76px;
      display: grid;
      place-items: center;
      text-shadow: 0 3px 12px rgba(0, 0, 0, 0.25);
      border-bottom: 1px solid rgba(248, 250, 252, 0.12);
    }

    .tile {
      width: 100%;
      background: linear-gradient(165deg, #2563eb 0%, #1e3a8a 55%, #172554 100%);
      color: #fef08a;
      border-top: 1px solid rgba(255, 255, 255, 0.12);
      font-size: 1.6rem;
      font-weight: 900;
      min-height: 86px;
      border-radius: 0;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.18);
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.35);
      position: relative;
      overflow: hidden;
      will-change: transform, box-shadow, filter;
      transition: transform 0.24s ease, box-shadow 0.24s ease, filter 0.24s ease, opacity 0.24s ease;
    }

    .tile::after {
      content: "";
      position: absolute;
      inset: -120% 30% auto;
      height: 160%;
      background: linear-gradient(120deg, transparent 0%, rgba(255, 255, 255, 0.24) 50%, transparent 100%);
      transform: rotate(12deg);
      transition: transform 0.6s ease;
      pointer-events: none;
    }

    .tile:hover {
      transform: translateY(-3px) scale(1.035);
      box-shadow: var(--tile-shadow), 0 0 0 2px rgba(125, 211, 252, 0.45), 0 0 24px rgba(56, 189, 248, 0.55);
      --tile-glow: 0 0 24px rgba(59, 130, 246, 0.52);
    }

    .tile:hover::after {
      transform: translateY(20%) rotate(12deg);
    }

    .tile:active {
      transform: translateY(0) scale(0.97);
    }

    .tile.used {
      background: linear-gradient(155deg, #0b1020 0%, #111827 100%);
      color: #475569;
      cursor: not-allowed;
      pointer-events: none;
      box-shadow: inset 0 0 0 1px rgba(100, 116, 139, 0.2);
      text-shadow: none;
      filter: grayscale(0.35);
      opacity: 0.55;
      transform: scale(0.97);
    }

    .tile.used::after {
      display: none;
    }

    .tile.revealing {
      animation: tileReveal 0.34s cubic-bezier(.25,.75,.2,1) forwards;
      pointer-events: none;
    }

    @keyframes tileReveal {
      0% { transform: scale(1); }
      50% { transform: rotateY(78deg) scale(1.05); filter: brightness(1.18); }
      100% { transform: rotateY(0deg) scale(0.97); }
    }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(2, 6, 23, 0.8);
      display: none;
      justify-content: center;
      align-items: center;
      padding: 20px;
      z-index: 999;
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    .modal.show {
      display: flex;
      opacity: 1;
    }

    .dialog {
      width: min(760px, 100%);
      background: linear-gradient(145deg, #0f172a 0%, #1e293b 100%);
      border: 1px solid rgba(148, 163, 184, 0.34);
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.45);
      display: grid;
      gap: 16px;
      text-align: center;
      transform: scale(0.96);
      animation: popIn 0.22s ease forwards;
    }

    @keyframes popIn {
      to {
        transform: scale(1);
      }
    }

    .dialog h2 {
      color: var(--accent);
      font-size: 1.25rem;
      text-shadow: 0 2px 10px rgba(251, 191, 36, 0.2);
    }

    .question {
      font-size: clamp(1.18rem, 2.3vw, 1.45rem);
      line-height: 1.75;
      font-weight: 700;
      color: #f8fafc;
    }

    .answer {
      max-height: 0;
      opacity: 0;
      overflow: hidden;
      border-top: 1px dashed rgba(148, 163, 184, 0.45);
      margin-top: 0;
      padding-top: 0;
      color: #e2e8f0;
      font-size: 1.15rem;
      transition: max-height 0.3s ease, opacity 0.3s ease, padding-top 0.3s ease, margin-top 0.3s ease;
    }

    .answer.show {
      max-height: 140px;
      opacity: 1;
      margin-top: 8px;
      padding-top: 12px;
    }

    .dialog-actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
    }

    .primary {
      background: linear-gradient(135deg, #f59e0b, #f97316);
      color: #111827;
      font-weight: 900;
      padding: 10px 14px;
      box-shadow: 0 8px 18px rgba(249, 115, 22, 0.38);
    }

    .secondary {
      background: linear-gradient(140deg, #475569, #334155);
      color: #f8fafc;
      padding: 10px 14px;
    }

    .note {
      text-align: center;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .turn-indicator {
      background: rgba(30, 41, 59, 0.8);
      border: 1px solid rgba(148, 163, 184, 0.35);
      border-radius: 10px;
      padding: 7px 10px;
      font-weight: 700;
      color: #cbd5e1;
      white-space: nowrap;
    }

    .panel-dialog {
      width: min(920px, 100%);
      text-align: right;
      max-height: 90vh;
      overflow-y: auto;
    }

    .admin-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 14px;
      text-align: right;
    }

    .panel-box {
      background: rgba(15, 23, 42, 0.55);
      border: 1px solid rgba(148, 163, 184, 0.26);
      border-radius: 12px;
      padding: 12px;
      display: grid;
      gap: 10px;
    }

    .panel-box h3 {
      color: #7dd3fc;
      font-size: 1rem;
    }

    .admin-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    textarea, select, input[type="number"], input[type="file"] {
      width: 100%;
      border-radius: 10px;
      border: 1px solid rgba(148, 163, 184, 0.35);
      background: rgba(15, 23, 42, 0.9);
      color: #f8fafc;
      padding: 8px 10px;
      font-size: 0.95rem;
    }

    textarea {
      min-height: 130px;
      resize: vertical;
      direction: ltr;
      text-align: left;
    }

    .error-box {
      min-height: 36px;
      color: #fca5a5;
      background: rgba(127, 29, 29, 0.2);
      border: 1px solid rgba(248, 113, 113, 0.35);
      border-radius: 10px;
      padding: 8px;
      font-size: 0.9rem;
      display: none;
    }

    .error-box.show {
      display: block;
    }

    body.tv-mode {
      font-size: 1.16rem;
      padding: 18px;
    }

    body.tv-mode .top,
    body.tv-mode .column,
    body.tv-mode .dialog {
      border-width: 2px;
    }

    body.tv-mode .tile {
      min-height: 104px;
      font-size: 2rem;
    }

    body.tv-mode .category {
      min-height: 94px;
      font-size: 1.2rem;
    }

    body.tv-mode .team-score {
      font-size: 2.1rem;
    }

    @media (max-width: 960px) {
      body {
        padding: 14px;
      }

      .board {
        grid-template-columns: repeat(2, minmax(130px, 1fr));
        gap: 8px;
      }

      .tile {
        min-height: 70px;
      }

      .category {
        min-height: 62px;
        font-size: 0.9rem;
        padding: 8px;
      }

      .team-card {
        min-width: 155px;
      }
    }

    @media (max-width: 620px) {
      .board {
        grid-template-columns: repeat(1, minmax(0, 1fr));
      }

      .tile {
        min-height: 64px;
        font-size: 1.2rem;
      }

      .top {
        position: sticky;
        top: 8px;
        z-index: 10;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="top">
      <h1>🎯 لعبة تربّع - تحدي المعرفة</h1>
      <div class="scoreboard" id="scoreboard"></div>
      <div class="header-actions">
        <div class="turn-indicator" id="turnIndicator"></div>
        <button class="reset" id="tvModeBtn">⛶ وضع التلفاز</button>
        <button class="reset" id="adminBtn">⚙️ الإدارة</button>
        <button class="reset" id="newGameBtn">لعبة جديدة</button>
        <button class="reset" id="resetBtn">إعادة ضبط النقاط</button>
      </div>
    </div>

    <div class="board" id="board"></div>
    <p class="note">اضغط على أي مربع لعرض السؤال، ثم أظهر الإجابة وحدّث نقاط الفريق الفائز.</p>
  </div>

  <div class="modal" id="modal">
    <div class="dialog">
      <h2 id="modalTitle"></h2>
      <p class="question" id="questionText"></p>
      <p class="answer" id="answerText"></p>
      <div class="dialog-actions">
        <button class="primary" id="showAnswerBtn">إظهار الإجابة</button>
        <button class="award" id="awardTeam1">احتساب للفريق الأول</button>
        <button class="award" id="awardTeam2">احتساب للفريق الثاني</button>
        <button class="secondary" id="closeBtn">إغلاق</button>
      </div>
    </div>
  </div>

  <div class="modal" id="adminModal">
    <div class="dialog panel-dialog">
      <h2>لوحة الإدارة</h2>
      <div class="admin-grid">
        <div class="panel-box">
          <h3>تصدير بنك الأسئلة</h3>
          <div class="admin-actions">
            <button class="primary" id="copyJsonBtn">نسخ JSON</button>
            <button class="secondary" id="downloadJsonBtn">تحميل JSON</button>
          </div>
        </div>

        <div class="panel-box">
          <h3>استيراد بنك الأسئلة</h3>
          <textarea id="importText" placeholder="الصق JSON هنا..."></textarea>
          <input type="file" id="importFile" accept="application/json,.json" />
          <div class="admin-actions">
            <button class="award" id="applyImportBtn">تطبيق الاستيراد</button>
          </div>
          <div class="error-box" id="importErrors"></div>
        </div>

        <div class="panel-box">
          <h3>إعدادات الجولة</h3>
          <label>مدة المؤقت (ثانية)
            <input type="number" id="timerSecondsInput" min="5" max="300" step="5" />
          </label>
          <label>نمط نقاط السرقة
            <select id="stealModeSelect">
              <option value="full">كامل</option>
              <option value="half">نصف</option>
              <option value="off">إيقاف</option>
            </select>
          </label>
          <button class="primary" id="saveSettingsBtn">حفظ الإعدادات</button>
        </div>
      </div>
      <div class="dialog-actions">
        <button class="secondary" id="closeAdminBtn">إغلاق</button>
      </div>
    </div>
  </div>

  <script>
    const DIFFICULTIES = [1, 2, 3, 4, 5];
    const DIFFICULTY_POINTS = {
      1: 100,
      2: 200,
      3: 300,
      4: 400,
      5: 500
    };

    let questionBank = {
      "القرآن الكريم": [
        { q: "ما هي أول سورة في القرآن الكريم؟", a: "سورة الفاتحة", difficulty: 1 },
        { q: "كم عدد سور القرآن الكريم؟", a: "114 سورة", difficulty: 1 },
        { q: "في أي شهر نزل القرآن الكريم؟", a: "في شهر رمضان", difficulty: 1 },
        { q: "ما اسم السورة التي تبدأ بـ (الحمد لله رب العالمين)؟", a: "سورة الفاتحة", difficulty: 1 },

        { q: "في أي سورة ورد لقب (أحسن القصص)؟", a: "سورة يوسف", difficulty: 5 }
      ],
      "التاريخ الإسلامي": [
        { q: "من هو أول الخلفاء الراشدين؟", a: "أبو بكر الصديق رضي الله عنه", difficulty: 1 },

        { q: "في أي مدينة وقعت غزوة بدر؟", a: "قرب المدينة المنورة عند بدر", difficulty: 2 },

        { q: "ما اسم صلح عقد بين المسلمين وقريش؟", a: "صلح الحديبية", difficulty: 2 },
        { q: "من هو القائد الذي فتح مصر؟", a: "عمرو بن العاص", difficulty: 2 },
        { q: "ما اسم عام مولد النبي ﷺ؟", a: "عام الفيل", difficulty: 2 },
        { q: "في أي عام هاجر النبي ﷺ إلى المدينة؟", a: "622 ميلاديًا", difficulty: 3 },

    function showScorePop(teamId, amount) {
      const card = scoreboardEl.querySelector(`.team-card[data-team-id="${teamId}"]`);
      if (!card) return;
      const pop = card.querySelector(".score-pop");
      if (!pop) return;
      pop.className = `score-pop ${amount >= 0 ? "positive" : "negative"}`;
      pop.textContent = `${amount >= 0 ? "+" : "-"}${Math.abs(amount)}`;
      void pop.offsetWidth;
      pop.classList.add("show");
    }

    function getPointsForDifficulty(difficulty) {
      return DIFFICULTY_POINTS[difficulty] ?? 0;
    }

    function pickRandom(array) {
      return array[Math.floor(Math.random() * array.length)];
    }

    function buildGameDataFromPools() {
      return Object.entries(questionBank).map(([category, pool]) => {
        const selectedQuestions = [];
        const usedQuestions = new Set();

        DIFFICULTIES.forEach((difficulty) => {
          const candidates = pool.filter(
            (item) => item.difficulty === difficulty && item.q && item.a && !usedQuestions.has(item.q)
          );

          let chosen = null;

          if (candidates.length === 0) {
            console.error(`Missing questions for category "${category}" at difficulty ${difficulty}. Falling back to any unused question.`);
            const fallbackCandidates = pool.filter(
              (item) => item.q && item.a && !usedQuestions.has(item.q)
            );
            chosen = pickRandom(fallbackCandidates);
          } else {
            chosen = pickRandom(candidates);
          }

          if (!chosen) {
            console.error(`No unused fallback question available for category "${category}".`);
            chosen = {
              q: `تعذر تحميل سؤال لهذا المربع (${category}).`,
              a: "يرجى مراجعة بنك الأسئلة.",
              difficulty
            };
          }

          usedQuestions.add(chosen.q);
          selectedQuestions.push({
            q: chosen.q,
            a: chosen.a,
            difficulty,
            points: getPointsForDifficulty(difficulty)
          });
        });

        return { category, questions: selectedQuestions };
      });
    }

    function renderScoreboard() {
      scoreboardEl.innerHTML = "";

      teams.forEach((team) => {
        const card = document.createElement("div");
        const isActive = currentTurnTeamId === team.id;
        card.className = `team-card team-${team.id + 1}${isActive ? " active" : ""}`;
        card.dataset.teamId = String(team.id);

        card.innerHTML = `
          <div class="team-name">${team.name}<span>${team.score} نقطة</span></div>
          <div class="controls">
            <button class="subtract" data-team="${team.id}" data-type="subtract">خصم 100</button>

          <div class="team-score">${team.score}</div>
          <div class="score-pop" aria-hidden="true"></div>

        scoreboardEl.appendChild(card);

      scoreboardEl.querySelectorAll("button").forEach((btn) => {

    function openQuestion(tile, category, item) {
      if (tile.classList.contains("used") || tile.classList.contains("revealing")) return;
      tile.classList.add("revealing");
      tile.disabled = true;

      setTimeout(() => {
        tile.classList.remove("revealing");
        tile.classList.add("used");
        activeTile = tile;
        activeQuestion = item;

        modalTitle.textContent = `${category} - ${item.points} نقطة`;
        questionText.textContent = item.q;
        answerText.textContent = `الإجابة: ${item.a}`;
        answerText.classList.remove("show");
        showAnswerBtn.disabled = false;
        showAnswerBtn.textContent = "إظهار الإجابة";
        modal.classList.add("show");
      }, 260);
    }

    function validateQuestionBank(data) {
      const errors = [];
      if (!data || typeof data !== "object" || Array.isArray(data)) {
        return ["البيانات ليست كائن JSON صالح لبنك الأسئلة."];
      }

      const categories = Object.keys(data);
      if (categories.length !== 5) {
        errors.push("يجب أن يحتوي بنك الأسئلة على 5 فئات بالضبط.");
      }

      categories.forEach((category) => {
        const items = data[category];
        if (!Array.isArray(items) || !items.length) {
          errors.push(`الفئة "${category}" يجب أن تحتوي قائمة أسئلة غير فارغة.`);
          return;
        }

        items.forEach((item, idx) => {
          if (!item || typeof item !== "object") {
            errors.push(`الفئة "${category}" السؤال رقم ${idx + 1} غير صالح.`);
            return;
          }

          if (typeof item.q !== "string" || !item.q.trim()) {
            errors.push(`الفئة "${category}" السؤال رقم ${idx + 1}: الحقل q مطلوب.`);
          }
          if (typeof item.a !== "string" || !item.a.trim()) {
            errors.push(`الفئة "${category}" السؤال رقم ${idx + 1}: الحقل a مطلوب.`);
          }
          if (!Number.isInteger(item.difficulty) || item.difficulty < 1 || item.difficulty > 5) {
            errors.push(`الفئة "${category}" السؤال رقم ${idx + 1}: difficulty يجب أن يكون بين 1 و 5.`);
          }
        });
      });

      return errors;
    }

    async function copyToClipboard(text) {
      if (navigator.clipboard?.writeText) {
        await navigator.clipboard.writeText(text);
        return;
      }

      const temp = document.createElement("textarea");
      temp.value = text;
      document.body.appendChild(temp);
      temp.select();
      document.execCommand("copy");
      temp.remove();
    }

      try {
        const parsed = JSON.parse(importText.value);
        const errors = validateQuestionBank(parsed);
        if (errors.length) {
          setImportErrors(errors);
          return;
        }

        questionBank = parsed;
        setImportErrors(["تم الاستيراد بنجاح. سيتم بدء لعبة جديدة بالبيانات الجديدة."]);
        startNewGame();
      } catch (error) {
        setImportErrors(["JSON غير صالح. تحقق من البنية وحاول مجددًا."]);
      }
    });

    saveSettingsBtn.addEventListener("click", () => {
      const timerValue = Number(timerSecondsInput.value);
      if (!Number.isInteger(timerValue) || timerValue < 5 || timerValue > 300) {
        setImportErrors(["مدة المؤقت يجب أن تكون رقمًا صحيحًا بين 5 و 300 ثانية."]);
        return;
      }

      gameSettings.timerSeconds = timerValue;
      gameSettings.stealMode = stealModeSelect.value;
      setImportErrors([`تم حفظ الإعدادات: مؤقت ${timerValue}ث، وضع السرقة ${gameSettings.stealMode}.`]);
    });

    tvModeBtn.addEventListener("click", async () => {
      try {
        if (!document.fullscreenElement) {
          await document.documentElement.requestFullscreen();
          document.body.classList.add("tv-mode");
          tvModeBtn.textContent = "⛶ إنهاء وضع التلفاز";
        } else {
          await document.exitFullscreen();
          document.body.classList.remove("tv-mode");
          tvModeBtn.textContent = "⛶ وضع التلفاز";
        }
      } catch (error) {
        document.body.classList.toggle("tv-mode");
      }
    });

    document.addEventListener("fullscreenchange", () => {
      if (!document.fullscreenElement) {
        document.body.classList.remove("tv-mode");
        tvModeBtn.textContent = "⛶ وضع التلفاز";
      }
    });

    newGameBtn.addEventListener("click", startNewGame);

    renderScoreboard();
    startNewGame();
  </script>
</body>
</html>
