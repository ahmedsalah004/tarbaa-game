<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>لعبة تربّع - مسابقة معلومات</title>
  <style>
    :root {
      --bg-1: #020617;
      --bg-2: #0f172a;
      --panel: rgba(15, 23, 42, 0.74);
      --panel-strong: #111c34;
      --card: #1e293b;
      --accent: #fbbf24;
      --accent-2: #22d3ee;
      --team-1: #38bdf8;
      --team-2: #f472b6;
      --good: #22c55e;
      --bad: #ef4444;
      --text: #f8fafc;
      --muted: #94a3b8;
      --shadow: 0 16px 36px rgba(0, 0, 0, 0.35);
      --tile-shadow: 0 8px 16px rgba(37, 99, 235, 0.35);
      --tile-glow: 0 0 0 rgba(59, 130, 246, 0.5);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: "Tajawal", "Cairo", "Segoe UI", sans-serif;
    }

    body {
      direction: rtl;
      min-height: 100vh;
      color: var(--text);
      background:
        radial-gradient(circle at 15% 15%, rgba(56, 189, 248, 0.18) 0%, transparent 35%),
        radial-gradient(circle at 80% 8%, rgba(244, 114, 182, 0.15) 0%, transparent 30%),
        linear-gradient(165deg, var(--bg-2) 0%, var(--bg-1) 75%);
      padding: 24px;
    }

    .container {
      max-width: 1260px;
      margin: 0 auto;
      display: grid;
      gap: 20px;
    }

    .top {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      justify-content: space-between;
      align-items: center;
      background: var(--panel);
      border: 1px solid rgba(148, 163, 184, 0.24);
      border-radius: 20px;
      padding: 18px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(7px);
    }

    h1 {
      font-size: clamp(1.35rem, 2.3vw, 1.9rem);
      letter-spacing: 0.4px;
      color: var(--accent);
      text-shadow: 0 2px 12px rgba(251, 191, 36, 0.28);
    }

    .scoreboard {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .team-card {
      background: linear-gradient(160deg, #1e293b 8%, #0b1226 100%);
      border: 1px solid rgba(148, 163, 184, 0.2);
      border-radius: 14px;
      padding: 10px 14px;
      min-width: 190px;
      display: grid;
      gap: 8px;
      transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
    }

    .team-card.active {
      transform: translateY(-3px) scale(1.02);
      border-color: rgba(248, 250, 252, 0.55);
      box-shadow: 0 0 0 1px rgba(248, 250, 252, 0.35), 0 12px 28px rgba(14, 165, 233, 0.3);
    }

    .team-card.team-1.active {
      border-color: rgba(56, 189, 248, 0.95);
      box-shadow: 0 0 0 1px rgba(56, 189, 248, 0.45), 0 12px 28px rgba(56, 189, 248, 0.35);
    }

    .team-card.team-2.active {
      border-color: rgba(244, 114, 182, 0.95);
      box-shadow: 0 0 0 1px rgba(244, 114, 182, 0.42), 0 12px 28px rgba(244, 114, 182, 0.3);
    }

    .team-name {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-weight: 700;
      color: var(--accent-2);
      gap: 8px;
    }

    .team-score {
      font-size: 1.55rem;
      font-weight: 900;
      letter-spacing: 0.5px;
    }

    .controls {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
    }

    button {
      border: none;
      border-radius: 10px;
      padding: 7px 12px;
      font-size: 0.92rem;
      cursor: pointer;
      color: #f8fafc;
      transition: transform 0.22s cubic-bezier(.2,.9,.2,1), opacity 0.2s ease, box-shadow 0.22s ease, filter 0.2s ease;
    }

    button:hover {
      transform: translateY(-1px);
      filter: brightness(1.04);
    }

    button:active {
      transform: translateY(1px) scale(0.98);
    }

    .subtract {
      background: linear-gradient(140deg, #ef4444, #b91c1c);
      box-shadow: 0 6px 14px rgba(239, 68, 68, 0.3);
    }

    .award {
      background: linear-gradient(140deg, #16a34a, #15803d);
      font-weight: 700;
      box-shadow: 0 8px 16px rgba(34, 197, 94, 0.32);
    }

    .reset {
      background: linear-gradient(140deg, #334155, #1e293b);
      border: 1px solid rgba(148, 163, 184, 0.32);
      padding: 10px 15px;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(5, minmax(140px, 1fr));
      gap: 12px;
    }

    .column {
      background: rgba(17, 28, 52, 0.64);
      border: 1px solid rgba(148, 163, 184, 0.22);
      border-radius: 14px;
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    .category {
      background: linear-gradient(135deg, #0284c7 0%, #2563eb 100%);
      text-align: center;
      font-size: 1rem;
      font-weight: 800;
      padding: 14px 8px;
      min-height: 76px;
      display: grid;
      place-items: center;
      text-shadow: 0 3px 12px rgba(0, 0, 0, 0.25);
      border-bottom: 1px solid rgba(248, 250, 252, 0.12);
    }

    .tile {
      width: 100%;
      background: linear-gradient(165deg, #2563eb 0%, #1e3a8a 55%, #172554 100%);
      color: #fef08a;
      border-top: 1px solid rgba(255, 255, 255, 0.12);
      font-size: 1.6rem;
      font-weight: 900;
      min-height: 86px;
      border-radius: 0;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.18);
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.35);
      position: relative;
      overflow: hidden;
      will-change: transform, box-shadow;
    }

    .tile::after {
      content: "";
      position: absolute;
      inset: -120% 30% auto;
      height: 160%;
      background: linear-gradient(120deg, transparent 0%, rgba(255, 255, 255, 0.24) 50%, transparent 100%);
      transform: rotate(12deg);
      transition: transform 0.6s ease;
      pointer-events: none;
    }

    .tile:hover {
      transform: translateY(-2px) scale(1.02);
      box-shadow: var(--tile-shadow), 0 0 0 2px rgba(125, 211, 252, 0.35), 0 0 20px rgba(56, 189, 248, 0.42);
      --tile-glow: 0 0 24px rgba(59, 130, 246, 0.52);
    }

    .tile:hover::after {
      transform: translateY(20%) rotate(12deg);
    }

    .tile:active {
      transform: translateY(0) scale(0.97);
    }

    .tile.used {
      background: linear-gradient(155deg, #0b1020 0%, #111827 100%);
      color: #475569;
      cursor: default;
      pointer-events: none;
      box-shadow: inset 0 0 0 1px rgba(100, 116, 139, 0.2);
      text-shadow: none;
    }

    .tile.used::after {
      display: none;
    }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(2, 6, 23, 0.8);
      display: none;
      justify-content: center;
      align-items: center;
      padding: 20px;
      z-index: 999;
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    .modal.show {
      display: flex;
      opacity: 1;
    }

    .dialog {
      width: min(760px, 100%);
      background: linear-gradient(145deg, #0f172a 0%, #1e293b 100%);
      border: 1px solid rgba(148, 163, 184, 0.34);
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.45);
      display: grid;
      gap: 16px;
      text-align: center;
      transform: scale(0.96);
      animation: popIn 0.22s ease forwards;
    }

    @keyframes popIn {
      to {
        transform: scale(1);
      }
    }

    .dialog h2 {
      color: var(--accent);
      font-size: 1.25rem;
      text-shadow: 0 2px 10px rgba(251, 191, 36, 0.2);
    }

    .question {
      font-size: clamp(1.18rem, 2.3vw, 1.45rem);
      line-height: 1.75;
      font-weight: 700;
      color: #f8fafc;
    }

    .answer {
      max-height: 0;
      opacity: 0;
      overflow: hidden;
      border-top: 1px dashed rgba(148, 163, 184, 0.45);
      margin-top: 0;
      padding-top: 0;
      color: #e2e8f0;
      font-size: 1.15rem;
      transition: max-height 0.3s ease, opacity 0.3s ease, padding-top 0.3s ease, margin-top 0.3s ease;
    }

    .answer.show {
      max-height: 140px;
      opacity: 1;
      margin-top: 8px;
      padding-top: 12px;
    }

    .dialog-actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
    }

    .primary {
      background: linear-gradient(135deg, #f59e0b, #f97316);
      color: #111827;
      font-weight: 900;
      padding: 10px 14px;
      box-shadow: 0 8px 18px rgba(249, 115, 22, 0.38);
    }

    .secondary {
      background: linear-gradient(140deg, #475569, #334155);
      color: #f8fafc;
      padding: 10px 14px;
    }

    .note {
      text-align: center;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .admin-panel {
      background: var(--panel);
      border: 1px solid rgba(148, 163, 184, 0.24);
      border-radius: 16px;
      padding: 14px;
      display: grid;
      gap: 12px;
      box-shadow: var(--shadow);
    }

    .admin-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 12px;
      color: #e2e8f0;
    }

    .admin-row label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.95rem;
      cursor: pointer;
    }

    .manual-categories {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      gap: 8px;
    }

    .manual-categories.disabled {
      opacity: 0.55;
      pointer-events: none;
    }

    .lifelines {
      border-top: 1px solid rgba(148, 163, 184, 0.36);
      padding-top: 12px;
      display: grid;
      gap: 10px;
      text-align: right;
    }

    .lifeline-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
    }

    .lifeline-btn {
      background: linear-gradient(140deg, #0369a1, #1d4ed8);
      border: 1px solid rgba(186, 230, 253, 0.35);
      font-weight: 700;
    }

    .lifeline-btn.used {
      opacity: 0.4;
      filter: grayscale(0.55);
      cursor: not-allowed;
    }

    .lifeline-output {
      min-height: 30px;
      color: #bfdbfe;
      line-height: 1.7;
      font-size: 1rem;
    }

    .options-list {
      list-style: decimal;
      margin: 6px 24px 0 0;
      display: grid;
      gap: 6px;
    }

    .friend-overlay {
      position: absolute;
      inset: 0;
      background: rgba(2, 6, 23, 0.88);
      display: none;
      place-items: center;
      border-radius: 20px;
      text-align: center;
      z-index: 20;
    }

    .friend-overlay.show {
      display: grid;
    }

    .friend-overlay-content {
      display: grid;
      gap: 8px;
      color: #fef3c7;
      font-weight: 800;
      font-size: 1.25rem;
    }

    @media (max-width: 960px) {
      .board {
        grid-template-columns: 1fr;
      }

      .tile {
        min-height: 70px;
      }

      .category {
        min-height: auto;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="top">
      <h1>🎯 لعبة تربّع - تحدي المعرفة</h1>
      <div class="scoreboard" id="scoreboard"></div>
      <button class="reset" id="newGameBtn">لعبة جديدة</button>
      <button class="reset" id="resetBtn">إعادة ضبط النقاط</button>
    </div>

    <div class="admin-panel">
      <div class="admin-row">

        <label><input type="radio" name="categoryMode" value="manual"> اختيار يدوي (5 فئات)</label>
      </div>
      <div class="manual-categories disabled" id="manualCategories"></div>
      <p class="note" id="categoryModeNote">الوضع الحالي: اختيار عشوائي لخمس فئات.</p>
    </div>

    <div class="board" id="board"></div>
    <p class="note">اضغط على أي مربع لعرض السؤال، ثم أظهر الإجابة وحدّث نقاط الفريق الفائز.</p>
  </div>

  <div class="modal" id="modal">
    <div class="dialog" id="dialog">
      <div class="friend-overlay" id="friendOverlay">
        <div class="friend-overlay-content">

      <p class="answer" id="answerText"></p>
      <div class="lifelines">
        <div class="lifeline-buttons">
          <button class="lifeline-btn" id="lifelineOptionsBtn">٤ خيارات</button>
          <button class="lifeline-btn" id="lifelineFriendBtn">اتصل بصديق</button>

        <div class="lifeline-output" id="lifelineOutput"></div>

      <div class="dialog-actions">

        <button class="award" id="awardTeam1">احتساب للفريق الأول</button>
        <button class="award" id="awardTeam2">احتساب للفريق الثاني</button>
        <button class="secondary" id="closeBtn">إغلاق</button>
      </div>
    </div>
  </div>

    function getPointsForDifficulty(difficulty) {
      return DIFFICULTY_POINTS[difficulty] ?? 0;
    }

    function pickRandom(array) {
      return array[Math.floor(Math.random() * array.length)];
    }

    function shuffleArray(array) {
      const cloned = [...array];
      for (let i = cloned.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [cloned[i], cloned[j]] = [cloned[j], cloned[i]];
      }
      return cloned;
    }

    function getAllCategories() {
      return Object.keys(questionBank);

    function getCategoriesForGame() {
      const allCategories = getAllCategories();
      if (selectedCategoryMode === "manual") {
        const manualList = [...manualSelectedCategories].filter((category) => allCategories.includes(category));
        if (manualList.length === 5) {
          return manualList;
        }
      }
      return shuffleArray(allCategories).slice(0, 5);
    }

    function buildGameDataFromPools() {
      const categoriesForGame = getCategoriesForGame();
      return categoriesForGame.map((category) => {
        const pool = questionBank[category] || [];
        const selectedQuestions = [];
        const usedQuestions = new Set();

        DIFFICULTIES.forEach((difficulty) => {
          const candidates = pool.filter(
            (item) => item.difficulty === difficulty && item.q && item.a && !usedQuestions.has(item.q)
          );

          let chosen = null;

          if (candidates.length === 0) {
            console.error(`Missing questions for category "${category}" at difficulty ${difficulty}. Falling back to any unused question.`);
            const fallbackCandidates = pool.filter(
              (item) => item.q && item.a && !usedQuestions.has(item.q)
            );
            chosen = pickRandom(fallbackCandidates);
          } else {
            chosen = pickRandom(candidates);
          }

          if (!chosen) {
            console.error(`No unused fallback question available for category "${category}".`);
            chosen = {
              q: `تعذر تحميل سؤال لهذا المربع (${category}).`,
              a: "يرجى مراجعة بنك الأسئلة.",
              difficulty
            };
          }

          usedQuestions.add(chosen.q);
          selectedQuestions.push({
            q: chosen.q,
            a: chosen.a,
            hint: chosen.hint,
            hint2: chosen.hint2,
            difficulty,
            points: getPointsForDifficulty(difficulty)
          });
        });

        return { category, questions: selectedQuestions };
      });
    }

    function detectAnswerType(answer) {
      if (/\d/.test(answer)) return "الإجابة رقم أو سنة";
      if (/مدينة|القاهرة|مكة|المدينة|الرياض|باريس|لندن|دمشق|بغداد|الإسكندرية/.test(answer)) return "الإجابة مدينة";
      if (answer.includes(" ")) return "الإجابة من كلمتين أو أكثر";
      return "الإجابة كلمة واحدة";
    }

    function buildStrongHint(answer) {
      const trimmed = String(answer || "").trim();
      const words = trimmed.split(/\s+/).filter(Boolean);
      const firstWord = words[0] || "";
      const firstLetter = firstWord ? firstWord[0] : "-";
      const lettersCount = trimmed.replace(/\s+/g, "").length;
      return `تبدأ بـ: ${firstLetter} — أول كلمة: ${firstWord || "غير متوفر"} — عدد الحروف: ${lettersCount}`;
    }

      manualCategoriesEl.innerHTML = "";

        checkbox.type = "checkbox";
        checkbox.checked = manualSelectedCategories.has(category);
        checkbox.addEventListener("change", () => {
          if (checkbox.checked) {
            if (manualSelectedCategories.size >= 5) {
              checkbox.checked = false;
              return;
            }
            manualSelectedCategories.add(category);
          } else {
            manualSelectedCategories.delete(category);
          }
          updateCategoryModeNote();
        });
        label.appendChild(checkbox);
        label.append(` ${category}`);
        manualCategoriesEl.appendChild(label);
      });

      const isManual = selectedCategoryMode === "manual";
      manualCategoriesEl.classList.toggle("disabled", !isManual);
      updateCategoryModeNote();

    function openQuestion(tile, category, item) {
      if (tile.classList.contains("used")) return;
      activeTile = tile;
      activeQuestion = item;

      tile.classList.add("used");
      tile.disabled = true;

      modalTitle.textContent = `${category} - ${item.points} نقطة`;

    function useLifelineOptions() {
      if (!activeQuestion || lifelinesState.options) return;
      const categoryPool = questionBankMeta.distractors[activeCategory] || [];
      const sameCategoryAnswers = (questionBank[activeCategory] || []).map((item) => item.a);
      const candidateDistractors = shuffleArray([...categoryPool, ...sameCategoryAnswers]);
      const unique = new Set([activeQuestion.a]);

      for (const candidate of candidateDistractors) {
        if (unique.size >= 4) break;
        if (!candidate || candidate === activeQuestion.a) continue;
        unique.add(candidate);
      }

      const fallbackDistractors = ["غير متاح", "إجابة بديلة", "خيار آخر"];
      for (const fallback of fallbackDistractors) {
        if (unique.size >= 4) break;
        unique.add(fallback);
      }

      const options = shuffleArray([...unique]).slice(0, 4);
      lifelineOutput.innerHTML = `<div>خيارات المساعدة:</div><ol class="options-list">${options.map((opt) => `<li>${opt}</li>`).join("")}</ol>`;
      lifelinesState.options = true;
      renderLifelinesState();
    }

    function useLifelineFriend() {
      if (!activeQuestion || lifelinesState.friend) return;
      lifelinesState.friend = true;
      renderLifelinesState();

      let seconds = 15;
      friendCountdown.textContent = String(seconds);
      friendOverlay.classList.add("show");
      clearFriendOverlay();
      friendOverlay.classList.add("show");

      activeFriendInterval = setInterval(() => {
        seconds -= 1;
        friendCountdown.textContent = String(Math.max(0, seconds));
        if (seconds <= 0) {
          clearFriendOverlay();
        }
      }, 1000);

      const suggestion = activeQuestion.hint
        ? `اقتراح الصديق: ${activeQuestion.hint}`
        : `اقتراح الصديق: ${detectAnswerType(activeQuestion.a)}.`;
      lifelineOutput.innerHTML = `<div>${suggestion}</div>`;
    }

    function useLifelineStrongHint() {
      if (!activeQuestion || lifelinesState.strongHint) return;
      const hintText = activeQuestion.hint2 || buildStrongHint(activeQuestion.a);
      lifelineOutput.innerHTML = `<div>تلميح قوي: ${hintText}</div>`;
      lifelinesState.strongHint = true;
      renderLifelinesState();
    }

    showAnswerBtn.addEventListener("click", () => {
      if (!activeQuestion) return;
      answerText.classList.add("show");
      showAnswerBtn.disabled = true;
      showAnswerBtn.textContent = "تم عرض الإجابة";
    });

    awardTeam1.addEventListener("click", () => awardPoints(0));
    awardTeam2.addEventListener("click", () => awardPoints(1));

    closeBtn.addEventListener("click", closeModal);

    modal.addEventListener("click", (event) => {
      if (event.target === modal) {
        closeModal();
      }
    });

    resetBtn.addEventListener("click", () => {
      teams.forEach((team) => {
        team.score = 0;
      });
      closeModal();
      renderScoreboard();
    });

    document.querySelectorAll('input[name="categoryMode"]').forEach((radio) => {
      radio.addEventListener("change", () => {
        selectedCategoryMode = radio.value;
        renderCategoryControls();
      });
    });

    lifelineOptionsBtn.addEventListener("click", useLifelineOptions);
    lifelineFriendBtn.addEventListener("click", useLifelineFriend);
    lifelineStrongHintBtn.addEventListener("click", useLifelineStrongHint);

    function startNewGame() {
      teams.forEach((team) => {
        team.score = 0;
      });
      Object.keys(lifelinesState).forEach((key) => {
        lifelinesState[key] = false;
      });
      currentTurnTeamId = 0;
      currentGameData = buildGameDataFromPools();
      closeModal();
      renderScoreboard();
      renderBoard();
      renderLifelinesState();
    }

    newGameBtn.addEventListener("click", startNewGame);

    renderCategoryControls();
    renderScoreboard();
    startNewGame();
  </script>
</body>
</html>
